<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GST Copilot</title>

  <style>
    body {
      font-family: Arial;
      width: 320px;
      padding: 10px;
      background: #f5f5f5;
    }

    .tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: #ddd;
      cursor: pointer;
    }

    .active {
      background: #28a745;
      color: white;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
    }

    #results {
      margin-top: 10px;
      background: white;
      padding: 8px;
      display: none;
    }

    #toast {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      background: black;
      color: white;
      padding: 8px;
      display: none;
    }
  </style>
</head>

<body>

  <h3>GST Copilot</h3>

  <!-- TABS -->
  <div class="tabs">
    <button id="gstin-tab" class="tab active">GSTIN</button>
    <button id="hsn-tab" class="tab">HSN</button>
    <button id="tax-tab" class="tab">Tax</button>
  </div>

  <!-- GSTIN SECTION -->
  <div id="gstin-section">

    <input id="gstin-input" placeholder="Enter GSTIN">

    <button id="extract-btn">Extract from page</button>

    <br><br>

    <button id="validate-btn">Validate GSTIN</button>

  </div>

  <!-- RESULTS -->
  <div id="results">
    <p><b>GSTIN:</b> <span id="res-gstin"></span></p>
    <p><b>Name:</b> <span id="res-name"></span></p>
    <p><b>Status:</b> <span id="res-status"></span></p>
    <p><b>State:</b> <span id="res-state"></span></p>
    <p><b>Reg Date:</b> <span id="res-date"></span></p>
  </div>

  <!-- LICENSE -->
  <div style="margin-top:10px;">
    <input id="license-input" placeholder="Enter License Key">
    <button id="license-btn">Activate Pro</button>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <script src="popup.js"></script>

</body>
</html>
